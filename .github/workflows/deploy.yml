name: Deploy Angular to Pages

on:
  push:
    branches: ["main"] # Controlla se il tuo branch principale si chiama main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -- --base-href /datotosantalbano/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pizzeria_toto/browser # Attenzione a questo percorso!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
